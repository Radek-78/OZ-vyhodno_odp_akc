<script>
    /* ═══════════════════════════════════════════
       PDF MODULE — jeden list = jedno PDF
       ═══════════════════════════════════════════ */
    S.pdfData = { sheets: [], targetFolderName: '' };

    function vPDF(m) {
        setLoading(true, 'Příprava PDF', 'Načítání listů...');
        google.script.run
            .withSuccessHandler(function (d) {
                setLoading(false);
                S.pdfData = d || { sheets: [], targetFolderName: '' };
                renderPdfUi(m);
            })
            .withFailureHandler(function (e) { setLoading(false); onErr(e); })
            .modulePDF_getInitData();
    }

    function renderPdfUi(m) {
        var d = S.pdfData;
        var sheets = d.sheets || [];
        var settings = d.settings || {};
        var rangeId = settings.rangeId || 'B2:M10';
        var size = settings.size || 'A4';
        var orientation = settings.orientation || 'portrait';
        var gridlines = !!settings.gridlines;
        var pageNumbers = !!settings.pageNumbers;
        var defaultCount = 0;

        var cbs = sheets.map(function (sheet) {
            var checked = pdfShouldSelectSheet(sheet);
            if (checked) defaultCount++;
            return '<label class="cbox">' +
                '<input type="checkbox" class="sCb" value="' + esc(sheet) + '"' + (checked ? ' checked' : '') + '>' +
                '<span>' + esc(sheet) + '</span>' +
                '</label>';
        }).join('');

        var folderName = d.targetFolderName || 'Složka aktuálního souboru';

        m.innerHTML =
            '<div class="pdf-wrap">' +

            '<div class="pdf-card">' +
            '<div class="pdf-card-bar"></div>' +
            '<div class="pdf-card-body">' +
            '<div class="pdf-count-row">' +
            '<div style="display:flex;align-items:center;gap:8px">' +
            '<span class="kt-sec-lbl" style="margin:0">Listy pro generování</span>' +
            '<span id="pdfSheetCount" class="pdf-count-badge">' + defaultCount + ' / ' + sheets.length + '</span>' +
            '</div>' +
            '<div class="pdf-sel-links">' +
            '<a href="#" onclick="pdfSelAllStd(true);return false">Vybrat vše</a>' +
            ' &nbsp;|&nbsp; ' +
            '<a href="#" onclick="pdfSelectDefault();return false">Výchozí LC</a>' +
            ' &nbsp;|&nbsp; ' +
            '<a href="#" onclick="pdfSelAllStd(false);return false">Odznačit vše</a>' +
            '</div>' +
            '</div>' +
            '<div class="pdf-sheets-grid" onchange="pdfUpdateSheetCount()">' + cbs + '</div>' +
            '</div></div>' +

            '<div class="pdf-batch-bottom">' +

            '<div class="pdf-card">' +
            '<div class="pdf-card-bar"></div>' +
            '<div class="pdf-card-body">' +
            '<div class="kt-sec-lbl">Nastavení tisku</div>' +
            '<div class="pdf-two-col">' +
            '<div class="fg"><div class="fg-label">Velikost papíru</div><select id="fPdfSize" class="fg-select"><option value="A4"' + (size === 'A4' ? ' selected' : '') + '>A4</option><option value="A3"' + (size === 'A3' ? ' selected' : '') + '>A3</option></select></div>' +
            '<div class="fg"><div class="fg-label">Orientace</div><select id="fPdfOr" class="fg-select"><option value="portrait"' + (orientation !== 'landscape' ? ' selected' : '') + '>Na výšku</option><option value="landscape"' + (orientation === 'landscape' ? ' selected' : '') + '>Na šířku</option></select></div>' +
            '</div>' +
            '<div style="display:flex;gap:20px;margin-top:10px">' +
            toggle('fPGrid', 'Zobrazit mřížku', gridlines) +
            toggle('fPNum', 'Čísla stránek', pageNumbers) +
            '</div>' +
            '</div></div>' +

            '<div class="pdf-card">' +
            '<div class="pdf-card-bar"></div>' +
            '<div class="pdf-card-body">' +
            '<div class="kt-sec-lbl">Rozsah a cíl</div>' +
            '<div class="pdf-two-col">' +
            '<div class="fg"><div class="fg-label">Rozsah generování</div><input type="text" id="fPdfRange" class="fg-input" value="' + esc(rangeId) + '"></div>' +
            '<div class="fg"><div class="fg-label">Cílová složka</div><div class="pdf-folder-info"><span>📂</span><strong>' + esc(folderName) + '</strong></div></div>' +
            '</div>' +
            '</div></div>' +

            '</div>' +
            '<div id="pdfRes"></div>' +
            '</div>';

        var fBtns = document.getElementById('fBtns');
        if (fBtns) {
            fBtns.innerHTML = '<button class="btn btn-p" onclick="execPDFSheets()">Generovat PDF</button>' +
                '<button class="btn btn-s" onclick="savePDFSettings()">Uložit nastavení</button>' +
                '<button class="btn btn-s" onclick="go(\'home\')">Zrušit</button>';
        }
    }

    function pdfShouldSelectSheet(sheetName) {
        var name = String(sheetName || '').trim();
        var lower = name.toLowerCase();
        if (name === 'Akční artikly') return false;
        if (name === 'Telex') return false;
        if (name === 'Filiálky') return false;
        if (lower.indexOf('odpisy') !== -1) return false;
        return true;
    }

    function pdfUpdateSheetCount() {
        var selected = document.querySelectorAll('.sCb:checked').length;
        var total = document.querySelectorAll('.sCb').length;
        var el = document.getElementById('pdfSheetCount');
        if (el) el.textContent = selected + ' / ' + total;
    }

    function pdfSelAllStd(v) {
        document.querySelectorAll('.sCb').forEach(function (c) { c.checked = v; });
        pdfUpdateSheetCount();
    }

    function pdfSelectDefault() {
        document.querySelectorAll('.sCb').forEach(function (c) { c.checked = pdfShouldSelectSheet(c.value); });
        pdfUpdateSheetCount();
    }

    function execPDFSheets() {
        if (S.busy) return;

        var names = [];
        document.querySelectorAll('.sCb:checked').forEach(function (c) { names.push(c.value); });
        if (names.length === 0) { alert('Vyberte alespoň jeden list.'); return; }

        var opts = getPDFSettingsFromUi();

        setBusy(true);
        setProgress(5, 'Generuji PDF...');

        google.script.run
            .withSuccessHandler(function (r) {
                setBusy(false);
                if (r.success) {
                    setProgress(100, 'Dokončeno (' + r.count + ')');
                    showResult('PDF vygenerována', '✅ Vytvořeno <strong>' + r.count + '</strong> PDF souborů do složky aktuální tabulky.', '📄');
                    setTimeout(function () { setProgress(0, ''); }, 3000);
                } else {
                    setProgress(0, '');
                    showResult('Chyba generování', 'Došlo k chybě při vytváření PDF:<br>' + esc(r.error), '❌');
                }
            })
            .withFailureHandler(function (e) { setBusy(false); setProgress(0, ''); onErr(e); })
            .modulePDF_exportSheets(names, opts);
    }

    function getPDFSettingsFromUi() {
        return {
            rangeId: document.getElementById('fPdfRange').value.trim() || 'B2:M10',
            size: document.getElementById('fPdfSize').value,
            orientation: document.getElementById('fPdfOr').value,
            portrait: document.getElementById('fPdfOr').value === 'portrait',
            gridlines: isOn('fPGrid'),
            pageNumbers: isOn('fPNum')
        };
    }

    function savePDFSettings() {
        if (S.busy) return;
        var opts = getPDFSettingsFromUi();

        setBusy(true);
        setProgress(20, 'Ukládám nastavení PDF...');

        google.script.run
            .withSuccessHandler(function (r) {
                setBusy(false);
                if (r.success) {
                    setProgress(100, 'Nastavení uloženo');
                    S.pdfData.settings = r.settings || opts;
                    showResult('Nastavení uloženo', '✅ PDF nastavení bylo uloženo do listu <strong>_Config</strong>.', '✅');
                    setTimeout(function () { setProgress(0, ''); }, 1800);
                } else {
                    setProgress(0, '');
                    showResult('Chyba uložení', 'Nastavení se nepodařilo uložit:<br>' + esc(r.error), '❌');
                }
            })
            .withFailureHandler(function (e) { setBusy(false); setProgress(0, ''); onErr(e); })
            .modulePDF_saveSettings(opts);
    }
</script>
