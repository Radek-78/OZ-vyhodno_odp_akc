<script>
    /* ═══════════════════════════════════════════
       KT MODULE
       ═══════════════════════════════════════════ */
    function vKT(m) {
        var pref = S.data.ktPref || { actionDate: '', targetFolderId: '' };
        var today = new Date();
        var defaultDate = pref.actionDate || today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

        // Složka se načítá lazy — zobrazíme placeholder a aktualizujeme async níže
        var autoName = S.data.ktAutoFolderName || '…';
        var autoId = S.data.ktAutoFolderId || '';

        m.innerHTML =
            '<div class="kt-wrap">' +

            '<div class="kt-main-card">' +
            '<div class="kt-top-bar"></div>' +
            '<div class="kt-card-body">' +

            '<div class="kt-fields-row">' +
            '<div class="kt-date-group" style="flex:0 0 230px">' +
            '<div class="kt-sec-lbl">Datum akce</div>' +
            '<div class="fg" style="margin-bottom:0">' +
            '<div class="fg-label">Akce od</div>' +
            '<input class="fg-input" type="date" id="fKtDate" value="' + esc(defaultDate) + '" style="font-size:13px">' +
            '</div>' +
            '<div class="fg-hint" id="ktDateHint" style="margin-top:6px">Vyberte datum pro nový soubor.</div>' +
            '</div>' +

            '<div class="kt-vdiv"></div>' +

            '<div class="kt-name-group">' +
            '<div class="kt-sec-lbl">Název souboru</div>' +
            '<div class="kt-preview-strip" style="margin-top:0">' +
            '<span class="kt-prev-lbl">Výsledný název</span>' +
            '<div class="kt-prev-val">' +
            '<span class="kt-prev-icon">📄</span>' +
            '<span id="ktPrev" class="kt-prev-text"></span>' +
            '</div>' +
            '</div>' +
            '<div class="kt-path-preview" id="ktDatePreview" style="margin-top:10px"></div>' +
            '</div>' +
            '</div>' +

            '</div>' +
            '</div>' +

            '<div class="kt-folder-card">' +
            '<div class="kt-sec-lbl" style="margin-bottom:10px">Cílová složka</div>' +
            '<div class="kt-folder-controls">' +
            '<div class="rgroup" style="margin:0;gap:16px;flex-shrink:0">' +
            radio('ktFolder', 'auto', 'Výchozí složka', !pref.targetFolderId) +
            radio('ktFolder', 'custom', 'Vlastní složka', !!pref.targetFolderId) +
            '</div>' +
            '<div class="kt-folder-badge" id="ktAutoInfo">' +
            '<span>📂</span>' +
            '<strong>' + esc(autoName) + '</strong>' +
            (autoId ? '<span class="kt-auto-id">' + esc(autoId) + '</span>' : '') +
            '</div>' +
            '</div>' +
            '<div class="kt-custom-input" id="ktCustomWrap"' + (pref.targetFolderId ? ' style="display:block"' : '') + '>' +
            '<input class="fg-input" type="text" id="fKtFolder" placeholder="Vložte URL nebo ID složky z Google Drive" value="' + esc(pref.targetFolderId) + '" style="font-size:11px;margin-top:8px">' +
            '</div>' +
            '<div class="kt-folder-foot">' +
            '<div class="fg-hint">Soubor se vždy vytvoří v podsložkách <strong>rok / KTxx</strong>.</div>' +
            '<div class="kt-path-preview" id="ktPathPrev" style="display:none"></div>' +
            '</div>' +
            '</div>' +

            '<div id="ktRes"></div>' +
            '</div>';

        var fBtns = document.getElementById('fBtns');
        if (fBtns) {
            fBtns.innerHTML = '<button class="btn btn-p" onclick="execKT()">📅 Vytvořit soubor</button>' +
                '<button class="btn btn-s" onclick="go(\'home\')">Zrušit</button>';
        }

        var dateEl = document.getElementById('fKtDate');

        function ktDateInfo() {
            var raw = dateEl.value;
            if (!raw) return null;
            var parts = raw.split('-').map(Number);
            var d = new Date(parts[0], parts[1] - 1, parts[2]);
            if (isNaN(d.getTime())) return null;
            var dayNames = ['NEDĚLE', 'PONDĚLÍ', 'ÚTERÝ', 'STŘEDA', 'ČTVRTEK', 'PÁTEK', 'SOBOTA'];
            return {
                date: d,
                iso: raw,
                week: isoWeek(d),
                year: d.getFullYear(),
                dayName: dayNames[d.getDay()],
                display: String(d.getDate()).padStart(2, '0') + '.' + String(d.getMonth() + 1).padStart(2, '0') + '.' + d.getFullYear()
            };
        }

        function isoWeek(date) {
            var d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
            var dayNum = d.getUTCDay() || 7;
            d.setUTCDate(d.getUTCDate() + 4 - dayNum);
            var yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function ktFileName(info) {
            return info.year + '_KT' + String(info.week).padStart(2, '0') + '_' + info.dayName;
        }

        function ktUpdPreview() {
            var info = ktDateInfo();
            var prevEl = document.getElementById('ktPrev');
            var hintEl = document.getElementById('ktDateHint');
            var datePreviewEl = document.getElementById('ktDatePreview');
            if (!info) {
                if (prevEl) prevEl.textContent = '';
                if (hintEl) hintEl.textContent = 'Vyberte platné datum.';
                if (datePreviewEl) datePreviewEl.textContent = '';
                ktUpdPath();
                return;
            }

            if (prevEl) prevEl.textContent = ktFileName(info);
            if (hintEl) hintEl.textContent = 'KT ' + String(info.week).padStart(2, '0') + ' · ' + info.dayName + ' · ' + info.year;
            if (datePreviewEl) datePreviewEl.innerHTML = '<span style="font-size:12px">📌</span> Do listů BNL/OLO/CER/BUS/BRV se zapíše <strong>Akce od ' + esc(info.display) + '</strong> do buňky B8';
            ktUpdPath();
        }

        function ktUpdPath() {
            var pathEl = document.getElementById('ktPathPrev');
            if (!pathEl) return;
            var info = ktDateInfo();
            if (!info) { pathEl.style.display = 'none'; return; }
            pathEl.style.display = 'flex';

            var folderName = S.data.ktAutoFolderName || '…';
            var isCustom = document.querySelector('input[name="ktFolder"]:checked');
            if (isCustom && isCustom.value === 'custom') folderName = 'Vlastní složka';

            pathEl.innerHTML = '<span style="font-size:12px">📁</span> ' +
                esc(folderName) + ' / <strong>' + esc(info.year) + '</strong> / <strong>KT' + esc(String(info.week).padStart(2, '0')) + '</strong> / ' + esc(ktFileName(info));
        }

        dateEl.addEventListener('change', ktUpdPreview);
        dateEl.addEventListener('input', ktUpdPreview);

        document.querySelectorAll('input[name="ktFolder"]').forEach(function (r) {
            r.addEventListener('change', function () {
                var wrap = document.getElementById('ktCustomWrap');
                if (wrap) wrap.style.display = r.value === 'custom' ? 'block' : 'none';
                ktUpdPath();
            });
        });

        ktUpdPreview();

        if (!S.data.ktAutoFolderId && !S.data._ktFolderLoaded) {
            google.script.run
                .withSuccessHandler(function (info) {
                    if (!info || !info.configured) return;
                    S.data.ktAutoFolderName = info.autoFolderName || 'Kořen Drive';
                    S.data.ktAutoFolderId = info.autoFolderId || '';
                    S.data._ktFolderLoaded = true;
                    var autoInfoEl = document.getElementById('ktAutoInfo');
                    if (autoInfoEl) {
                        autoInfoEl.innerHTML = '<span>📂</span> <strong>' + esc(S.data.ktAutoFolderName) + '</strong>' +
                            (S.data.ktAutoFolderId ? ' <span class="kt-auto-id">' + esc(S.data.ktAutoFolderId) + '</span>' : '');
                    }
                    ktUpdPath();
                })
                .moduleKT_getTemplateInfo();
        }
    }

    var _ktCountdown = null;

    function ktShowResult(r) {
        var url = r.url;
        var el = document.getElementById('ktRes');
        if (!el) return;

        el.innerHTML =
            '<div class="result-banner">' +
            '<div class="rb-head">' +
            '<div class="rb-icon">✓</div>' +
            '<div>' +
            '<div class="rb-title">Soubor úspěšně vytvořen</div>' +
            '<div class="rb-sub">Nový KT soubor je připraven na Google Drive</div>' +
            '</div>' +
            '</div>' +
            '<div class="rb-body">' +
            '<div class="rb-file">' +
            '<div class="rb-file-icon">📊</div>' +
            '<div>' +
            '<div class="rb-file-name">' + esc(r.fileName) + '</div>' +
            '<div class="rb-file-id">' + esc(r.fileId || '') + '</div>' +
            '</div>' +
            '</div>' +
            '<div class="rb-countdown">' +
            '<div class="rb-cd-circle" id="ktCdCircle" data-num="5"></div>' +
            '<div class="rb-cd-label">automatické<br>otevření</div>' +
            '</div>' +
            '</div>' +
            '<div class="rb-foot">' +
            '<button class="rb-open" onclick="ktOpenNow()">Otevřít nyní ↗</button>' +
            '<button class="rb-cancel" onclick="ktCancelCountdown()">Zrušit odpočet</button>' +
            '</div>' +
            '</div>';

        S._ktResultUrl = url;

        var circleEl = document.getElementById('ktCdCircle');
        var sec = 5;
        var startTime = Date.now();
        var totalMs = 5000;

        function animateRing() {
            if (!circleEl) return;
            var elapsed = Date.now() - startTime;
            var pct = Math.max(0, 100 - (elapsed / totalMs) * 100);
            circleEl.style.setProperty('--cd-pct', pct + '%');
            if (pct > 0 && _ktCountdown) requestAnimationFrame(animateRing);
        }
        requestAnimationFrame(animateRing);

        _ktCountdown = setInterval(function () {
            sec--;
            if (circleEl) circleEl.setAttribute('data-num', sec > 0 ? sec : '0');
            if (sec <= 0) {
                clearInterval(_ktCountdown);
                _ktCountdown = null;
                ktOpenNow();
            }
        }, 1000);
    }

    function ktOpenNow() {
        if (_ktCountdown) { clearInterval(_ktCountdown); _ktCountdown = null; }
        if (S._ktResultUrl) window.open(S._ktResultUrl, '_blank');
    }

    function ktCancelCountdown() {
        if (_ktCountdown) { clearInterval(_ktCountdown); _ktCountdown = null; }
        var circleEl = document.getElementById('ktCdCircle');
        if (circleEl) { circleEl.setAttribute('data-num', '—'); circleEl.style.setProperty('--cd-pct', '0%'); }
        var cancelBtn = document.querySelector('.rb-cancel');
        if (cancelBtn) { cancelBtn.textContent = 'Odpočet zrušen'; cancelBtn.disabled = true; }
    }

    function execKT() {
        if (S.busy) return;
        var dateEl = document.getElementById('fKtDate');
        var actionDate = dateEl ? dateEl.value : '';
        var info = actionDate ? (function () {
            var parts = actionDate.split('-').map(Number);
            var d = new Date(parts[0], parts[1] - 1, parts[2]);
            return isNaN(d.getTime()) ? null : true;
        })() : null;

        if (!info) { alert('Vyberte platné datum akce.'); return; }

        var folderRadio = document.querySelector('input[name="ktFolder"]:checked');
        var folderMode = folderRadio ? folderRadio.value : 'auto';
        var folderId = '';
        if (folderMode === 'custom') {
            folderId = document.getElementById('fKtFolder').value.trim();
        }

        setBusy(true);
        setProgress(10, 'Kopíruji šablonu...');

        google.script.run
            .withSuccessHandler(function (r) {
                setBusy(false);
                if (r.success) {
                    setProgress(100, 'Hotovo');
                    ktShowResult(r);
                    setTimeout(function () { setProgress(0, ''); }, 3000);
                } else {
                    setProgress(0, '');
                    showResult('Chyba vytvoření', 'Nepodařilo se vytvořit nový KT soubor:<br>' + esc(r.error), '❌');
                }
            })
            .withFailureHandler(function (e) { setBusy(false); setProgress(0, ''); onErr(e); })
            .moduleKT_create({
                actionDate: actionDate,
                targetFolderId: folderId,
                useSubfolders: true
            });
    }
</script>
